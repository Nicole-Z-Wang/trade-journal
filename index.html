<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易日志</title>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1A1918;
    --text2: #6B6860;
    --text3: #A09D96;
    --green: #1A7A4A;
    --green-bg: #EAF4EE;
    --red: #B83232;
    --red-bg: #FAEAEA;
    --amber: #8A5C00;
    --amber-bg: #FDF3DC;
    --accent: #1A1918;
    --font: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141312;
      --surface: #1E1D1B;
      --surface2: #272522;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --text: #F0EDE8;
      --text2: #9A9690;
      --text3: #6A6660;
      --green: #4ABA78;
      --green-bg: #0E2B1A;
      --red: #E06060;
      --red-bg: #2A1010;
      --amber: #E0A830;
      --amber-bg: #2A1E00;
      --accent: #F0EDE8;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .app-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { padding: 5px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text2); border: none; background: none; font-family: var(--font); transition: background 0.15s, color 0.15s; }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: var(--font); cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text2); transition: background 0.15s; }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-search { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-search input { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
  .sidebar-search input::placeholder { color: var(--text3); }
  .month-group { }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px 6px; cursor: pointer; user-select: none; }
  .month-header:hover { background: var(--surface2); }
  .month-name { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.02em; }
  .month-meta { display: flex; align-items: center; gap: 6px; }
  .pnl-badge { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 4px; }
  .pnl-badge.pos { background: var(--green-bg); color: var(--green); }
  .pnl-badge.neg { background: var(--red-bg); color: var(--red); }
  .pnl-badge.neutral { background: var(--surface2); color: var(--text3); }
  .trade-list { padding: 2px 8px 8px; }
  .trade-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
  .trade-row:hover { background: var(--surface2); }
  .trade-row.active { background: var(--surface2); }
  .trade-row.active .trade-ticker { color: var(--text); }
  .trade-ticker { font-size: 13px; font-weight: 600; color: var(--text); min-width: 52px; font-family: var(--mono); }
  .trade-date-label { font-size: 11px; color: var(--text3); flex: 1; }
  .dir-badge { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
  .dir-long { background: var(--green-bg); color: var(--green); }
  .dir-short { background: var(--red-bg); color: var(--red); }
  .trade-pnl-mini { font-size: 11px; font-family: var(--mono); }
  .trade-pnl-mini.pos { color: var(--green); }
  .trade-pnl-mini.neg { color: var(--red); }

  /* Detail pane */
  .detail { flex: 1; overflow-y: auto; background: var(--bg); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text3); }
  .empty-state p { font-size: 13px; }

  /* Entry detail */
  .entry-wrap { max-width: 760px; margin: 0 auto; padding: 28px 32px 60px; }
  .entry-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .entry-left { }
  .entry-ticker-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .entry-ticker { font-size: 24px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.5px; }
  .entry-name { font-size: 13px; color: var(--text2); }
  .entry-meta { font-size: 12px; color: var(--text3); display: flex; gap: 10px; align-items: center; margin-top: 4px; }
  .entry-actions { display: flex; gap: 6px; }
  .icon-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 14px; transition: background 0.15s; }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  /* Data strip */
  .data-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
  .data-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .data-cell-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .data-cell-val { font-size: 15px; font-weight: 600; font-family: var(--mono); color: var(--text); }
  .data-cell-val.pos { color: var(--green); }
  .data-cell-val.neg { color: var(--red); }

  /* Chart zone */
  .chart-zone { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .chart-zone-header { padding: 10px 14px 0; display: flex; align-items: center; justify-content: space-between; }
  .chart-zone-title { font-size: 11px; font-weight: 500; color: var(--text3); }
  .chart-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px; gap: 8px; color: var(--text3); cursor: pointer; }
  .chart-placeholder:hover { background: var(--surface2); }
  .chart-placeholder p { font-size: 12px; }
  .chart-img-wrap { position: relative; }
  .chart-img-wrap img { width: 100%; max-height: 240px; object-fit: contain; display: block; }
  .chart-remove { position: absolute; top: 6px; right: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; color: var(--text2); }

  /* Sections */
  .section { margin-bottom: 20px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea { width: 100%; min-height: 90px; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-family: var(--font); font-size: 13px; color: var(--text); background: var(--surface); resize: vertical; outline: none; line-height: 1.7; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--border-strong); }
  textarea::placeholder { color: var(--text3); }
  .error-block textarea { border-left: 3px solid var(--amber); }
  .review-block textarea { border-left: 3px solid var(--green); }

  /* Tags */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag { font-size: 12px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: background 0.1s; user-select: none; }
  .tag:hover { background: var(--surface2); }
  .tag.active { border-color: var(--text); color: var(--text); background: var(--surface2); font-weight: 500; }
  .tag-input { border: 1px dashed var(--border); background: transparent; font-family: var(--font); font-size: 12px; color: var(--text); padding: 3px 8px; border-radius: 20px; outline: none; width: 80px; }
  .tag-add-btn { font-size: 12px; color: var(--text3); cursor: pointer; padding: 3px 8px; border-radius: 20px; border: 1px dashed var(--border); }
  .tag-add-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* Rating */
  .rating-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .rating-item { display: flex; align-items: center; gap: 6px; }
  .rating-label { font-size: 12px; color: var(--text2); }
  .stars { display: flex; gap: 3px; }
  .star { font-size: 16px; cursor: pointer; color: var(--border-strong); transition: color 0.1s; }
  .star.on { color: #D4941A; }
  .star:hover ~ .star { color: var(--border-strong) !important; }
  .stars:hover .star { color: #D4941A; }
  .stars .star:hover ~ .star { color: var(--border-strong); }

  /* Stats view */
  .stats-wrap { max-width: 760px; margin: 0 auto; padding: 28px 32px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .stat-card-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .stat-card-val { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .stat-card-val.pos { color: var(--green); }
  .stat-card-val.neg { color: var(--red); }
  .stat-card-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .chart-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 20px; }
  .chart-bar-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 14px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: opacity 0.2s; cursor: pointer; }
  .bar:hover { opacity: 0.75; }
  .bar.pos { background: var(--green); }
  .bar.neg { background: var(--red); }
  .bar-label { font-size: 10px; color: var(--text3); }

  /* System view */
  .system-wrap { max-width: 760px; margin: 0 auto; padding: 28px 32px; }
  .system-section { margin-bottom: 24px; }
  .system-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .system-section textarea { min-height: 120px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 520px; max-width: 95vw; border: 1px solid var(--border-strong); }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input { width: 100%; padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 13px; outline: none; }
  .form-input:focus { border-color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  select.form-input { cursor: pointer; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }

  /* File input hidden */
  #file-import { display: none; }

  /* ── Position-based trade journal ─────────────────────────── */
  .sidebar-status-section { border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .sidebar-status-section:last-child { border-bottom: none; }
  .sidebar-status-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
  .pos-row { display: flex; flex-direction: column; gap: 1px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
  .pos-row:hover { background: var(--surface2); }
  .pos-row.active { background: var(--surface2); }
  .pos-row-top { display: flex; align-items: center; gap: 6px; }
  .pos-row-ticker { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--text); flex-shrink: 0; }
  .pos-row-name { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .pos-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .pos-status-dot.closed { background: var(--text3); }
  .pos-row-bottom { display: flex; align-items: center; gap: 6px; padding-left: 0; font-size: 11px; color: var(--text3); }
  .closed-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .open-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--green-bg); color: var(--green); font-weight: 500; }

  /* Position summary strip */
  .pos-summary-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }

  /* Ops compose form */
  .op-compose { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 22px; overflow: hidden; }
  .op-compose-row { display: flex; gap: 8px; padding: 12px; flex-wrap: wrap; align-items: flex-end; }
  .op-field { display: flex; flex-direction: column; gap: 4px; }
  .op-field label { font-size: 11px; color: var(--text3); }
  .op-field input, .op-field select { padding: 6px 9px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
  .op-field input:focus, .op-field select:focus { border-color: var(--text); }
  .op-dir-toggle { display: flex; border: 1px solid var(--border-strong); border-radius: 6px; overflow: hidden; }
  .op-dir-btn { padding: 6px 14px; font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--text2); border: none; font-family: var(--font); }
  .op-dir-btn.sel-buy { background: var(--green-bg); color: var(--green); font-weight: 600; }
  .op-dir-btn.sel-sell { background: var(--red-bg); color: var(--red); font-weight: 600; }
  .op-compose-logic { padding: 0 12px 12px; }
  .op-compose-logic textarea { min-height: 56px; font-size: 13px; }
  .op-compose-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--surface2); }
  .op-submit-btn { padding: 7px 16px; border-radius: 6px; border: none; background: var(--text); color: var(--bg); font-size: 12px; font-family: var(--font); cursor: pointer; font-weight: 500; }
  .op-submit-btn:hover { opacity: 0.85; }

  /* Ops list (the timeline of buy/sell actions) */
  .op-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .op-card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); overflow: hidden; }
  .op-card-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; }
  .op-action-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .op-action-buy { background: var(--green-bg); color: var(--green); }
  .op-action-sell { background: var(--red-bg); color: var(--red); }
  .op-card-shares { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--text); }
  .op-card-price { font-size: 13px; color: var(--text2); font-family: var(--mono); }
  .op-card-date { font-size: 11px; color: var(--text3); margin-left: auto; }
  .op-card-delete { font-size: 11px; color: var(--text3); cursor: pointer; opacity: 0; transition: opacity 0.15s; }
  .op-card:hover .op-card-delete { opacity: 1; }
  .op-card-body { padding: 0 12px 12px; }
  .op-card-logic { font-size: 13px; color: var(--text); line-height: 1.65; white-space: pre-wrap; background: var(--surface2); border-radius: 6px; padding: 8px 10px; margin-top: 2px; }
  .op-card-logic-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .op-card-chart-wrap { margin-top: 8px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
  .op-card-chart-wrap img { width: 100%; max-height: 220px; object-fit: contain; display: block; background: var(--surface2); }
  .op-card-chart-remove { position: absolute; top: 6px; right: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; color: var(--text2); }
  .op-card-chart-upload { margin-top: 8px; padding: 5px 10px; border-radius: 6px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text3); font-size: 12px; font-family: var(--font); cursor: pointer; }
  .op-card-chart-upload:hover { color: var(--text); border-color: var(--text); }

  /* ── Sector color palette ───────────────────────────────────── */
  .sc-0 { background:#E8EEFF; color:#3D52B0; border-color:#C5CFFB; }
  .sc-1 { background:#FEF9E0; color:#8A6200; border-color:#F5DC80; }
  .sc-2 { background:#E4F8EC; color:#1A7A42; border-color:#A8E8C0; }
  .sc-3 { background:#FDEEF6; color:#A0296A; border-color:#F5BEE0; }
  .sc-4 { background:#E0F5FF; color:#0A6EA0; border-color:#A0DEFA; }
  .sc-5 { background:#FDEAEA; color:#B03030; border-color:#F5AAAA; }
  .sc-6 { background:#F2ECFF; color:#7030A8; border-color:#DABEFC; }
  .sc-7 { background:#E8FBF4; color:#0E6B52; border-color:#90E8CC; }
  .sc-8 { background:#FFF3E8; color:#A04010; border-color:#F8C89A; }
  .sc-9 { background:#EDFBE0; color:#387018; border-color:#AAEА80; }
  @media (prefers-color-scheme: dark) {
    .sc-0 { background:#1A1F42; color:#9AAEF8; border-color:#2E3A8A; }
    .sc-1 { background:#1E1800; color:#F0C840; border-color:#5A4200; }
    .sc-2 { background:#041E0E; color:#70D898; border-color:#0E4A22; }
    .sc-3 { background:#280818; color:#F090C0; border-color:#600830; }
    .sc-4 { background:#041828; color:#60C8F0; border-color:#0A4068; }
    .sc-5 { background:#280808; color:#F09090; border-color:#601010; }
    .sc-6 { background:#200840; color:#C090F8; border-color:#4A1880; }
    .sc-7 { background:#021A10; color:#50D8A8; border-color:#084830; }
    .sc-8 { background:#200800; color:#F0A060; border-color:#602000; }
    .sc-9 { background:#081800; color:#80D840; border-color:#204800; }
  }

  /* Structured timeline entry */
  .tl-structured { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .tl-structured-meta { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; background: var(--surface2); }
  .tl-type-badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; border: 1px solid; }
  .tl-type-market  { background:#EEF2FF; color:#3730A3; border-color:#C7D2FE; }
  .tl-type-fundamental { background:#DCFCE7; color:#166534; border-color:#BBF7D0; }
  .tl-type-sentiment { background:#FEF3C7; color:#92400E; border-color:#FDE68A; }
  .tl-type-policy { background:#F3E8FF; color:#6B21A8; border-color:#E9D5FF; }
  .tl-type-logic { background:#FEE2E2; color:#991B1B; border-color:#FECACA; }
  @media (prefers-color-scheme: dark) {
    .tl-type-market { background:#1E1B4B; color:#A5B4FC; border-color:#3730A3; }
    .tl-type-fundamental { background:#052E16; color:#86EFAC; border-color:#166534; }
    .tl-type-sentiment { background:#1C1408; color:#FCD34D; border-color:#78350F; }
    .tl-type-policy { background:#3B0764; color:#D8B4FE; border-color:#6B21A8; }

const SB_URL  = 'https://zibdzpusqsqzsikvwfwd.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppYmR6cHVzcXNxenNpa3Z3ZndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzgyMDUsImV4cCI6MjA5NzE1NDIwNX0.6SB2icyntKKWZQE_7ruDj9EgKrVbsuwb0PMFYGMZz08';

let _session = null; // { access_token, user }

async function sbFetch(path, opts = {}) {
  const headers = {
    'apikey': SB_KEY,
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  };
  if (_session?.access_token) headers['Authorization'] = 'Bearer ' + _session.access_token;
  const res = await fetch(SB_URL + path, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error_description || res.statusText);
  }
  const text = await res.text();

let _loginTab = 'login';
function setLoginTab(t) {
  _loginTab = t;
  document.querySelectorAll('.login-tab').forEach((el,i) => el.classList.toggle('active', ['login','signup'][i]===t));
  document.getElementById('auth-btn').textContent = t === 'login' ? '登录' : '注册';

  try {
    const endpoint = _loginTab === 'login' ? '/auth/v1/token?grant_type=password' : '/auth/v1/signup';
    const data = await sbFetch(endpoint, {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    if (_loginTab === 'signup' && !data.access_token) {
      errEl.textContent = '注册成功！请查收验证邮件后登录';
      document.getElementById('auth-btn').textContent = '注册';
      return;
    }
    _session = { access_token: data.access_token, user: data.user };
    localStorage.setItem('tj_session', JSON.stringify(_session));
    await bootApp();
  } catch(e) {
    errEl.textContent = e.message.includes('Invalid') ? '邮箱或密码错误' : e.message;
    document.getElementById('auth-btn').textContent = _loginTab === 'login' ? '登录' : '注册';
  }
}

async function tryRestoreSession() {
  try {
    const raw = localStorage.getItem('tj_session');
    if (!raw) return false;
    const saved = JSON.parse(raw);
    // Verify token still valid
    const user = await sbFetch('/auth/v1/user', { headers: { 'Authorization': 'Bearer ' + saved.access_token } });
    if (user?.id) { _session = saved; return true; }
  } catch(e) {}
  localStorage.removeItem('tj_session');
  return false;
}

function logout() {
  localStorage.removeItem('tj_session');
  _session = null;
  location.reload();
}

// ── Position computation helpers ──
function computePosition(t) {
  // t.ops: [{action:'buy'/'sell', date, price, shares, logic, chartImg, id}]
  const ops = (t.ops || []).slice().sort((a,b) => a.date.localeCompare(b.date));
  let totalShares = 0, totalCost = 0, realizedPnl = 0, avgCost = 0;
  ops.forEach(op => {
    const shares = parseFloat(op.shares) || 0;
    const price = parseFloat(op.price) || 0;
    if (op.action === 'buy') {
      totalCost += shares * price;
      totalShares += shares;
      avgCost = totalShares > 0 ? totalCost / totalShares : 0;
    } else {
      realizedPnl += (price - avgCost) * shares;
      totalCost -= avgCost * shares;
      totalShares -= shares;
      if (totalShares < 0.0001) { totalShares = 0; totalCost = 0; }
    }
  });
  const firstDate = ops.length ? ops[0].date : null;
  const lastDate = ops.length ? ops[ops.length-1].date : null;
  return {
    ops, totalShares, avgCost,
    realizedPnl,
    isClosed: ops.length > 0 && totalShares <= 0.0001,
    firstDate, lastDate
  };
}

function renderSidebar() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const trades = db.trades.filter(t =>
    !q || t.ticker.toLowerCase().includes(q) || (t.name||'').toLowerCase().includes(q)
  );

  const el = document.getElementById('sidebar-list');
  if (!trades.length) {
    el.innerHTML = '<div style="padding:16px 14px;font-size:12px;color:var(--text3)">暂无记录</div>';
    return;
  }

  const withPos = trades.map(t => ({ t, pos: computePosition(t) }));
  const openList = withPos.filter(x => !x.pos.isClosed);
  const closedList = withPos.filter(x => x.pos.isClosed);

  function renderMonthGroups(items) {
    const groups = {};
    items.forEach(({t, pos}) => {
      const key = (pos.firstDate || '0000-00').slice(0, 7);
      if (!groups[key]) groups[key] = [];
      groups[key].push({ t, pos });
    });
    const sortedKeys = Object.keys(groups).sort((a,b) => b.localeCompare(a));
    return sortedKeys.map(key => {
      const list = groups[key].sort((a,b) => (b.pos.lastDate||'').localeCompare(a.pos.lastDate||''));
      const totalPnl = list.reduce((s, {pos}) => s + pos.realizedPnl, 0);
      const pnlClass = totalPnl > 0 ? 'pos' : totalPnl < 0 ? 'neg' : 'neutral';
      const pnlText = Math.abs(totalPnl) < 0.01 ? '—' : (totalPnl > 0 ? '+' : '') + totalPnl.toLocaleString('zh-CN', {maximumFractionDigits: 0});
      const ym = key.split('-');
      const label = ym[0] === '0000' ? '未记录日期' : (ym[0] + '年' + parseInt(ym[1]) + '月');

      const rows = list.map(({t, pos}) => {
        const pnlMini = pos.isClosed
          ? `<span class="trade-pnl-mini ${pos.realizedPnl>=0?'pos':'neg'}">${pos.realizedPnl>0?'+':''}${pos.realizedPnl.toLocaleString('zh-CN',{maximumFractionDigits:0})}</span>`
          : `<span style="font-size:11px;color:var(--text3)">${pos.totalShares}股</span>`;
        return `<div class="pos-row${t.id===selectedId?' active':''}" onclick="selectTrade('${t.id}')">
          <div class="pos-row-top">
            <span class="pos-status-dot${pos.isClosed?' closed':''}"></span>
            <span class="pos-row-ticker">${t.ticker}</span>
            ${t.name ? `<span class="pos-row-name">${t.name}</span>` : ''}
            ${pnlMini}
          </div>
          <div class="pos-row-bottom">
            <span>${pos.ops.length}次操作</span>
          </div>
        </div>`;
      }).join('');

      return `<div class="month-group">
        <div class="month-header">
          <span class="month-name">${label}</span>
          <div class="month-meta">
            <span class="pnl-badge ${pnlClass}">${pnlText}</span>
            <span style="font-size:11px;color:var(--text3)">${list.length}个标的</span>
          </div>
        </div>
        <div class="trade-list">${rows}</div>
      </div>`;
    }).join('');
  }

  const openSection = `<div class="sidebar-status-section">
    <div class="sidebar-status-header">
      <span class="open-badge" style="font-size:11px">持仓中</span>
      <span style="font-size:11px;color:var(--text3)">${openList.length}个</span>
    </div>
    ${openList.length ? renderMonthGroups(openList) : '<div style="padding:8px 14px;font-size:12px;color:var(--text3)">暂无持仓中标的</div>'}
  </div>`;

  const closedSection = `<div class="sidebar-status-section">
    <div class="sidebar-status-header">
      <span class="closed-badge" style="font-size:11px">已清仓</span>
      <span style="font-size:11px;color:var(--text3)">${closedList.length}个</span>
    </div>
    ${closedList.length ? renderMonthGroups(closedList) : '<div style="padding:8px 14px;font-size:12px;color:var(--text3)">暂无已清仓标的</div>'}
  </div>`;

  el.innerHTML = openSection + closedSection;
}

// ── Op direction toggle state ──
let _opDir = {};
function setOpDir(tid, dir) {
  _opDir[tid] = dir;
  const wrap = document.getElementById('op-dir-toggle-' + tid);
  if (wrap) {
    const btns = wrap.querySelectorAll('.op-dir-btn');
    btns[0].className = 'op-dir-btn' + (dir==='buy' ? ' sel-buy' : '');
    btns[1].className = 'op-dir-btn' + (dir==='sell' ? ' sel-sell' : '');
  }
}

let _pendingOpImg = {};
function uploadPendingOpImg(tid) {
  document.getElementById('op-img-input-' + tid)?.click();
}
function handlePendingOpImg(tid, e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    _pendingOpImg[tid] = ev.target.result;
    const btn = document.getElementById('op-img-btn-' + tid);
    if (btn) btn.textContent = '📷 已附图';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function addOp(tid) {
  const t = db.trades.find(x => x.id === tid);
  if (!t) return;
  const dir = _opDir[tid] || 'buy';
  const date = document.getElementById('op-date-' + tid).value;
  const price = document.getElementById('op-price-' + tid).value;
  const shares = document.getElementById('op-shares-' + tid).value;
  const position = document.getElementById('op-position-' + tid).value;
  const logic = document.getElementById('op-logic-' + tid).value.trim();
  if (!date || !price || !shares) { showToast('请填写日期、价格和股数'); return; }
  if (!t.ops) t.ops = [];
  t.ops.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    action: dir, date, price, shares, logic,
    position: position || null,
    chartImg: _pendingOpImg[tid] || null
  });
  delete _pendingOpImg[tid];
  delete _opDir[tid];
  saveTrade(t);
  renderSidebar(); renderDetail();
  showToast('操作已记录');
}

function deleteOp(tid, opId) {
  if (!confirm('删除这条操作记录？')) return;
  const t = db.trades.find(x => x.id === tid);
  if (t) { t.ops = (t.ops||[]).filter(o => o.id !== opId); saveTrade(t); renderSidebar(); renderDetail(); }
}

function saveOpLogic(tid, opId, val) {
  const t = db.trades.find(x => x.id === tid);
  const op = t?.ops.find(o => o.id === opId);
  if (op) { op.logic = val; debounceSave('oplogic_'+opId, () => saveTrade(t)); }
}

function uploadOpChart(tid, opId) {
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = 'image/*';
  fi.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const t = db.trades.find(x => x.id === tid);
      const op = t?.ops.find(o => o.id === opId);
      if (op) { op.chartImg = ev.target.result; saveTrade(t); renderDetail(); }
    };
    reader.readAsDataURL(file);
  };
  fi.click();
}

function removeOpChart(tid, opId) {
  const t = db.trades.find(x => x.id === tid);
  const op = t?.ops.find(o => o.id === opId);
  if (op) { op.chartImg = null; saveTrade(t); renderDetail(); }
}

function saveField(id, field, val) {
  const t = db.trades.find(x => x.id === id);
  if (t) { t[field] = val; debounceSave('field_'+id, () => saveTrade(t)); }
}

function setScore(id, type, val) {
  const t = db.trades.find(x => x.id === id);
  if (!t) return;
  if (type === 'exec') t.execScore = val;
  else t.logicScore = val;
  saveTrade(t); renderDetail();
}

function removeTag(id, tag) {
  const t = db.trades.find(x => x.id === id);
  if (!t) return;
  t.tags = (t.tags||[]).filter(x => x !== tag);
  saveTrade(t); renderDetail();
}

function showTagInput(id) {
  const wrap = document.getElementById('tags-wrap-' + id);
  const addBtn = wrap.querySelector('.tag-add-btn');
  if (!addBtn) return;
  const inp = document.createElement('input');
  inp.className = 'tag-input'; inp.placeholder = '输入后回车';
  let committed = false;
  inp.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const val = inp.value.trim();
      committed = true;
      if (val) {
        const t = db.trades.find(x => x.id === id);
        if (t) { t.tags = [...(t.tags||[]), val]; saveTrade(t); renderDetail(); }
      } else { inp.remove(); addBtn.style.display = ''; }
    }
    if (e.key === 'Escape') { committed = true; inp.remove(); addBtn.style.display = ''; }
  };
  inp.onblur = () => { if (!committed) { inp.remove(); addBtn.style.display = ''; } };
  addBtn.style.display = 'none';
  wrap.insertBefore(inp, addBtn);
  inp.focus();
}

// ─── Stats ────────────────────────────────────────────────────────────────
function renderStats() {
  const trades = db.trades;
  const positions = trades.map(t => ({ t, pos: computePosition(t) }));
  const closed = positions.filter(({pos}) => pos.isClosed);
  const totalPnl = closed.reduce((s, {pos}) => s + pos.realizedPnl, 0);
  const wins = closed.filter(({pos}) => pos.realizedPnl > 0).length;
  const winRate = closed.length ? Math.round(wins/closed.length*100) : 0;
  const avgPnl = closed.length ? (totalPnl / closed.length) : 0;

  // Monthly PnL (by last-op date of closed positions)
  const monthly = {};
  closed.forEach(({pos}) => {
    const k = (pos.lastDate || '').slice(0,7);
    if (!k) return;
    monthly[k] = (monthly[k]||0) + pos.realizedPnl;
  });
  const mKeys = Object.keys(monthly).sort().slice(-8);
  const maxAbs = Math.max(...mKeys.map(k => Math.abs(monthly[k])), 1);

  const bars = mKeys.map(k => {
    const v = monthly[k];
    const h = Math.max(4, Math.round(Math.abs(v)/maxAbs*80));
    const ym = k.split('-');
    const lbl = parseInt(ym[1]) + '月';
    return `<div class="bar-col">
      <div class="bar ${v>=0?'pos':'neg'}" style="height:${h}px" title="${v.toLocaleString()}"></div>
      <span class="bar-label">${lbl}</span>
    </div>`;
  }).join('');

  // Tag frequency
  const tagCount = {};
  trades.forEach(t => (t.tags||[]).forEach(tag => tagCount[tag] = (tagCount[tag]||0)+1));
  const topTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const tagCloud = topTags.map(([tag, cnt]) =>
    `<span class="tag">${tag} <span style="color:var(--text3)">${cnt}</span></span>`
  ).join('');

  const openCount = positions.length - closed.length;
  const pnlClass = totalPnl >= 0 ? 'pos' : 'neg';
  const totalStr = (totalPnl>=0?'+':'') + totalPnl.toLocaleString('zh-CN',{maximumFractionDigits:0});

  document.getElementById('stats-content').innerHTML = `
    <div style="font-size:16px;font-weight:600;margin-bottom:18px">总览</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-label">累计已实现盈亏</div>
        <div class="stat-card-val ${pnlClass}">${totalStr}</div>
        <div class="stat-card-sub">已清仓 ${closed.length} 个 · 持仓中 ${openCount} 个</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">胜率</div>
        <div class="stat-card-val">${winRate}%</div>
        <div class="stat-card-sub">${wins} 盈 / ${closed.length-wins} 亏</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">平均盈亏</div>
        <div class="stat-card-val ${avgPnl>=0?'pos':'neg'}">${(avgPnl>=0?'+':'') + avgPnl.toLocaleString('zh-CN',{maximumFractionDigits:0})}</div>
        <div class="stat-card-sub">每个已清仓标的</div>
      </div>
    </div>
    ${mKeys.length ? `
    <div class="chart-bar-wrap">
      <div class="chart-bar-title">近期月度盈亏（按清仓日期）</div>
      <div class="bar-chart">${bars}</div>
    </div>` : ''}
    ${topTags.length ? `
    <div class="chart-bar-wrap">
      <div class="chart-bar-title">高频标签</div>
      <div class="tags-wrap" style="margin-top:4px">${tagCloud}</div>
    </div>` : ''}
  `;
}

function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trade-journal-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('已导出 JSON');
}

async function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.trades) throw new Error('格式错误');
      if (!confirm(`导入将合并 ${imported.trades.length} 条记录（不覆盖现有数据）。继续？`)) return;
      const existingIds = new Set(db.trades.map(t => t.id));
      const newTrades = imported.trades.filter(t => !existingIds.has(t.id));
      newTrades.forEach(t => db.trades.push(t));
      if (imported.system) db.system = { ...db.system, ...imported.system };
      const existingWIds = new Set(db.watchlist.map(w => w.id));
      const newWatch = (imported.watchlist||[]).filter(w => !existingWIds.has(w.id));
      newWatch.forEach(w => db.watchlist.push(w));
      // Push all new items to Supabase
      showToast('上传中…');
      await Promise.all([
        ...newTrades.map(t => saveTrade(t)),
        ...newWatch.map(w => saveWatchItem(w)),
        saveSystemSB()
      ]);
      renderSidebar();
      showToast('导入完成');
    } catch(err) { showToast('文件格式有误，请检查'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');

}

function getSectorColorIdx(sector, explicitIdx) {
  if (explicitIdx !== undefined && explicitIdx !== null) return explicitIdx;
  if (!sector) return 0;
  if (_sectorColorMap[sector] === undefined) {
    _sectorColorMap[sector] = Object.keys(_sectorColorMap).length % 10;
  }
  return _sectorColorMap[sector];
}

  const ci = getSectorColorIdx(sector, colorIdx);

          <option value="fundamental">基本面</option>
          <option value="sentiment">情绪面</option>
          <option value="policy">政策消息</option>
          <option value="logic">逻辑变化</option>
        </select>
        <select class="compose-sel" id="tl-logic-${w.id}">
          <option value="same">逻辑未变</option>
          <option value="stronger">逻辑强化</option>
          <option value="weaker">逻辑弱化</option>
          <option value="broken">逻辑失效</option>
        </select>
        <select class="compose-sel" id="tl-action-${w.id}">
          <option value="none">无操作意向</option>
          <option value="buy">考虑买入</option>
          <option value="reduce">考虑减仓</option>
          <option value="traded">已操作</option>
        </select>
      </div>
      <div class="compose-body">
        <textarea id="tl-input-${w.id}" placeholder="写下今天的分析、行情观察、逻辑变化……"></textarea>
      </div>
      <div class="compose-footer">
        <div style="display:flex;align-items:center;gap:8px">${pendingImgHtml}</div>
        <button class="timeline-submit" onclick="addTlEntry('${w.id}')">记录</button>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:12px">分析时间线</div>
    <div class="timeline">
      ${tlItems || '<div style="font-size:13px;color:var(--text3);padding:8px 0">还没有记录，写下第一条分析吧</div>'}
    </div>
  </div>`;

  let fi = document.getElementById('pending-img-input-' + w.id);
  if (!fi) {
    fi = document.createElement('input');
    fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
    fi.id = 'pending-img-input-' + w.id;
    fi.onchange = (e) => handlePendingImg(w.id, e);
    document.body.appendChild(fi);
  }
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setWatchSentiment(id, s) {
  const w = db.watchlist.find(x => x.id === id);
  if (w) { w.sentiment = s; saveWatchItem(w); renderWatchSidebar(); renderWatchDetail(); }
}

function addTlEntry(id) {
  const inp = document.getElementById('tl-input-' + id);
  const text = (inp?.value || '').trim();
  if (!text) { showToast('请先写点什么'); return; }
  const w = db.watchlist.find(x => x.id === id);
  if (!w) return;
  if (!w.timeline) w.timeline = [];
  w.timeline.push({
    id: Date.now().toString(36),
    date: new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-'),
    text,
    type: document.getElementById('tl-type-' + id)?.value || 'market',
    logicState: document.getElementById('tl-logic-' + id)?.value || 'same',
    action: document.getElementById('tl-action-' + id)?.value || 'none',
    img: pendingTlImg || null
  });
  pendingTlImg = null;
  saveWatchItem(w); renderWatchSidebar(); renderWatchDetail();
  showToast('已记录');
}

function deleteTlEntry(watchId, idx) {
  if (!confirm('删除这条记录？')) return;
  const w = db.watchlist.find(x => x.id === watchId);
  if (w) { w.timeline.splice(idx, 1); saveWatchItem(w); renderWatchDetail(); }
}

function uploadTlImg(watchId, idx) {
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = 'image/*';
  fi.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const w = db.watchlist.find(x => x.id === watchId);
      if (w && w.timeline[idx]) { w.timeline[idx].img = ev.target.result; saveWatchItem(w); renderWatchDetail(); }
    };
    reader.readAsDataURL(file);
  };
  fi.click();
}

function removeTlImg(watchId, idx) {
  const w = db.watchlist.find(x => x.id === watchId);
  if (w && w.timeline[idx]) { w.timeline[idx].img = null; saveWatchItem(w); renderWatchDetail(); }
}

function uploadPendingImg(watchId) {
  document.getElementById('pending-img-input-' + watchId)?.click();
}

function handlePendingImg(watchId, e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { pendingTlImg = ev.target.result; renderWatchDetail(); };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── Color picker for modal ──
function buildColorSwatches(currentIdx) {
  const wrap = document.getElementById('color-swatches');
  if (!wrap) return;
  wrap.innerHTML = SECTOR_COLORS.map(c =>
    `<div onclick="selectColor(${c.idx})" title="${c.label}"
      style="width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid ${currentIdx===c.idx?'var(--text)':'transparent'}"
      class="sc-${c.idx}" id="swatch-${c.idx}"></div>`
  ).join('');
}

function selectColor(idx) {
  selectedColorIdx = idx;
  buildColorSwatches(idx);
  updateSectorPreview();
}

function updateSectorPreview() {
  const sec = (document.getElementById('wf-sector')?.value || '').trim() || '板块名称';
  const prev = document.getElementById('sector-preview');
  if (prev) {
    prev.textContent = sec;
    prev.className = `sc-${selectedColorIdx}`;
    prev.style.cssText = 'font-size:12px;padding:3px 10px;border-radius:4px;border:1px solid';
  }
}

// Watchlist modal
function openWatchModal(id) {
  editingWatchId = id || null;
  document.getElementById('watch-modal-title').textContent = id ? '编辑跟踪对象' : '新增跟踪对象';
  if (id) {
    const w = db.watchlist.find(x => x.id === id);
    document.getElementById('wf-ticker').value = w.ticker || '';
    document.getElementById('wf-name').value = w.name || '';
    document.getElementById('wf-sector').value = w.sector || '';
    document.getElementById('wf-market').value = w.market || 'A股';
    document.getElementById('wf-target').value = w.target || '';
    document.getElementById('wf-sentiment').value = w.sentiment || 'wait';
    document.getElementById('wf-thesis').value = w.thesis || '';
    document.getElementById('wf-catalyst').value = w.catalyst || '';
    document.getElementById('wf-invalidation').value = w.invalidation || '';
    selectedColorIdx = w.colorIdx ?? getSectorColorIdx(w.sector, w.colorIdx);
  } else {
    ['wf-ticker','wf-name','wf-sector','wf-target','wf-thesis','wf-catalyst','wf-invalidation'].forEach(i => { const el = document.getElementById(i); if(el) el.value=''; });
    document.getElementById('wf-market').value = 'A股';
    document.getElementById('wf-sentiment').value = 'wait';
    selectedColorIdx = Object.keys(_sectorColorMap).length % 10;
  }
  buildColorSwatches(selectedColorIdx);
  updateSectorPreview();
  document.getElementById('watch-modal').classList.add('open');
}

function closeWatchModal() { document.getElementById('watch-modal').classList.remove('open'); }

function saveWatch() {
  const ticker = document.getElementById('wf-ticker').value.trim();
  if (!ticker) { showToast('请填写代码或名称'); return; }
  const sector = document.getElementById('wf-sector').value.trim();
  if (sector && _sectorColorMap[sector] === undefined) _sectorColorMap[sector] = selectedColorIdx;
  const fields = {
    ticker, name: document.getElementById('wf-name').value.trim(),
    sector, market: document.getElementById('wf-market').value,
    target: document.getElementById('wf-target').value.trim(),
    sentiment: document.getElementById('wf-sentiment').value,
    colorIdx: selectedColorIdx,
    thesis: document.getElementById('wf-thesis').value.trim(),
    catalyst: document.getElementById('wf-catalyst').value.trim(),
    invalidation: document.getElementById('wf-invalidation').value.trim()
  };
  if (editingWatchId) {
    const w = db.watchlist.find(x => x.id === editingWatchId);
    if (w) Object.assign(w, fields);
    saveWatchItem(w);
  } else {
    const w = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,5), ...fields, timeline: [] };
    db.watchlist.push(w);
    selectedWatchId = w.id;
    saveWatchItem(w);
  }
  closeWatchModal(); renderWatchSidebar(); renderWatchDetail();
  showToast(editingWatchId ? '已更新' : '跟踪对象已添加');
}

function deleteWatch(id) {
  if (!confirm('删除该跟踪对象及所有记录？')) return;
  db.watchlist = db.watchlist.filter(x => x.id !== id);
  if (selectedWatchId === id) selectedWatchId = db.watchlist[0]?.id || null;
  deleteWatchSB(id); renderWatchSidebar(); renderWatchDetail();
  showToast('已删除');
}

// ─── Init ─────────────────────────────────────────────────────────────────
async function bootApp() {
  document.getElementById('login-screen').style.display = 'none';
  await loadDB();
  renderSidebar();
  if (db.trades.length) { selectedId = db.trades[0].id; renderDetail(); }
}

// Auto-restore session on load
(async () => {
  const ok = await tryRestoreSession();
  if (ok) await bootApp();
})();
</script>
</body>
</html>
